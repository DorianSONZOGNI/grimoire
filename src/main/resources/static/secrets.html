<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Secrets - Grimoire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="/favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="stylesheet" href="/styles/variables.css?v=4">
    <link rel="stylesheet" href="/styles/layout.css?v=4">
    <link rel="stylesheet" href="/styles/components.css?v=4">
    <style>
        .secrets-main {
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .secrets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
            margin-top: 2rem;
        }

        .secret-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .secret-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .secret-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--secret-color, #64748b);
        }

        .secret-icon {
            font-size: 3rem;
            color: var(--secret-color, #64748b);
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .secret-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #f8fafc;
            margin: 0;
        }

        .secret-level {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--secret-color, #64748b);
            background: rgba(0, 0, 0, 0.4);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-secret {
            background-image: linear-gradient(to right, #fbbf24, #d97706);
        }
    </style>
</head>

<body>

    <header class="top-header">
        <div class="page-logo">
            <span class="material-symbols-outlined logo-icon-gradient logo-secret">key</span>
            <span class="logo-text-gradient logo-secret">Mes Secrets</span>
        </div>
        <div class="header-actions">
            <div style="font-size: 0.9rem; color: var(--text-muted);">Savoir mystique...</div>
            <a href="/" class="top-nav-link nav-grimoire">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">auto_awesome</span> Grimoire
            </a>
            <a href="/armory.html" class="top-nav-link nav-armory">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">shield</span> Armurerie
            </a>
            <a href="/dungeons.html" class="top-nav-link nav-dungeon">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">swords</span> Donjons
            </a>
            <a href="/vault.html" class="top-nav-link nav-vault">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">money_bag</span> Coffres
            </a>
            <a href="/shop.html" class="top-nav-link nav-shop">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">storefront</span> Boutique
            </a>
            <a href="/alchemy.html" class="top-nav-link nav-alchemy">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">science</span> Alchimie
            </a>
            <a href="/shop-admin.html" id="adminShopLink" class="top-nav-link nav-admin" style="display: none;">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">settings</span> Admin Boutique
            </a>
            <a href="/pve-admin.html" id="adminPvELink" class="top-nav-link nav-admin" style="display: none;">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">admin_panel_settings</span> Admin PvE
            </a>
            <a href="/alchemy-admin.html" id="adminAlchemyLink" class="top-nav-link nav-admin" style="display: none;">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">science</span> Admin Alchimie
            </a>

            <div id="authNavContainer"
                style="display: flex; align-items: center; gap: 0.5rem; margin-left: 1rem; padding-left: 1rem; border-left: 1px solid var(--glass-border);">
                <!-- Dynamically injected by auth.js -->
                <span style="font-size: 0.85rem; color: var(--text-muted);">Chargement...</span>
            </div>
        </div>
    </header>

    <main style="display: block;">
        <div class="magic-rock"></div>

        <div class="secrets-main">
            <div id="secretsGrid" class="secrets-grid">
                <p style="color: var(--text-muted); text-align: center; grid-column: 1 / -1;">Chargement de vos
                    secrets...</p>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        const DEFAULT_SECRETS_META = [
            { name: "Secret du Chaos", icon: "local_fire_department", color: "#ff0000" },
            { name: "Secret de l'Abondance", icon: "eco", color: "#10b981" },
            { name: "Secret de la Préservation", icon: "foundation", color: "#99674c" },
            { name: "Secret de la Sérénité", icon: "water_drop", color: "#00e5cc" },
            { name: "Secret de la Chasse", icon: "visibility_off", color: "#ed5677" },
            { name: "Secret du Carnage", icon: "explosion", color: "#a70740" },
            { name: "Secret de la Joie", icon: "volcano", color: "#b74c0b" },
            { name: "Secret du Savoir", icon: "psychology", color: "#3b82f6" },
            { name: "Secret du Destin", icon: "all_inclusive", color: "#e7d198" },
            { name: "Secret de l'Éther", icon: "blur_on", color: "#38bdf8" },
            { name: "Secret des Abysses", icon: "dark_mode", color: "#c084fc" }
        ];

        window.addEventListener('authLoaded', () => {
            if (!window.currentUser) {
                document.getElementById('secretsGrid').innerHTML = "<p style='color: #ef4444; text-align:center; grid-column: 1 / -1;'>Veuillez vous connecter pour voir vos secrets.</p>";
                return;
            }

            renderSecrets();
        });

        function renderSecrets() {
            const grid = document.getElementById('secretsGrid');
            const secrets = window.currentUser.unlockedSecrets || {};
            const secretNames = Object.keys(secrets);

            if (secretNames.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1);">
                        <span class="material-symbols-outlined" style="font-size: 3rem; color: #64748b; margin-bottom: 1rem;">key_off</span>
                        <h3 style="color: #cbd5e1; margin-bottom: 0.5rem;">Aucun secret dévoilé</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">Pratiquez l'alchimie pour percer les mystères de ce monde.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = '';

            // Sort secrets alphabetically
            secretNames.sort((a, b) => a.localeCompare(b));

            secretNames.forEach(name => {
                const level = secrets[name];
                const meta = DEFAULT_SECRETS_META.find(s => s.name.toLowerCase() === name.toLowerCase())
                    || { icon: "key", color: "#f59e0b" };

                const card = document.createElement('div');
                card.className = 'secret-card';
                card.style.setProperty('--secret-color', meta.color);

                card.innerHTML = `
                    <div class="secret-icon">
                        <span class="material-symbols-outlined" style="font-size: 3rem;">${meta.icon}</span>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: center;">
                        <h3 class="secret-name">${name}</h3>
                        <span class="secret-level">Niveau ${level}</span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }
    </script>
</body>

</html>
