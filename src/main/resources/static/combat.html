<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire - Combat</title>
    <link rel="icon" type="image/png" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/sandbox.css">
    <style>
        body {
            background: #050505;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .combat-header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(220, 38, 38, 0.3);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .combat-arena {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5rem;
            position: relative;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.5), transparent 80%);
        }

        .fighter {
            width: 300px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .fighter-enemy {
            border-color: rgba(220, 38, 38, 0.4);
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.1);
        }

        .fighter-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 1rem;
        }

        .health-bar-bg {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .health-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f87171);
            width: 100%;
            transition: width 0.5s ease-out;
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .mana-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 1rem;
            position: relative;
        }

        .mana-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            width: 100%;
            transition: width 0.5s ease-out;
        }

        .fighter-sprite {
            font-size: 6rem;
            margin: 2rem 0;
            color: rgba(255,255,255,0.8);
        }
        
        .enemy-sprite {
            color: #ef4444;
        }

        .combat-log-container {
            width: 400px;
            height: 60vh;
            max-height: 60vh;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .combat-log {
            flex: 1;
            overflow-y: auto;
            font-size: 0.9rem;
            color: #94a3b8;
            padding-right: 0.5rem;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            line-height: 1.4;
        }

        .action-bar {
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .spells-container {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding-bottom: 0.5rem; /* for scrollbar */
            flex: 1;
            align-items: flex-end;
        }

        .spells-container::-webkit-scrollbar {
            height: 6px;
        }
        .spells-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        .spells-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem 2rem;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-btn.attack {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .action-btn.attack:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .action-btn.flee {
            color: #94a3b8;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .result-title.victory {
            background: linear-gradient(to right, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-title.defeat {
            background: linear-gradient(to right, #ef4444, #b91c1c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .floating-damage {
            position: absolute;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ef4444;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 50;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .event-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .event-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .enemy-card {
            cursor: pointer;
            border: 2px solid transparent;
            transform: scale(0.95);
            transition: all 0.2s;
        }
        
        .enemy-card.selected {
            border-color: #ef4444;
            transform: scale(1);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        
        .enemy-card.dead {
            opacity: 0.3;
            filter: grayscale(1);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="combat-header">
        <div class="page-logo">
            <span class="material-symbols-outlined logo-icon-gradient logo-dungeon">swords</span>
            <span class="logo-text-gradient logo-dungeon" id="headerDungeonName">Combat en cours...</span>
        </div>
        <div style="font-family: 'Outfit'; color: var(--text-muted);">
            Tour <span id="turnCounter" style="color: #f8fafc; font-weight: 600;">1</span>
        </div>
    </div>

    <div class="combat-arena" id="arena">
        
        <div class="fighter fighter-player" id="playerCard" style="display: flex; flex-direction: column; justify-content: center;">
            <!-- Player details are dynamically generated by combat.js -->
        </div>

        <!-- Log -->
        <div class="combat-log-container">
            <div style="font-family: 'Outfit'; font-weight: 600; color: #f8fafc; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">
                Journal de combat
            </div>
            <div class="combat-log" id="combatLog">
                <div class="log-entry">Chargement du combat...</div>
            </div>
        </div>

        <!-- Enemies -->
        <div id="enemiesContainer" style="display: flex; flex-direction: column; gap: 1rem; max-height: 80vh; overflow-y: auto; padding-right: 1rem;">
            <!-- Rempli par JS -->
        </div>

        <!-- Room Event Overlay (Treasure/Event) -->
        <div class="event-overlay" id="eventOverlay">
            <span class="material-symbols-outlined" id="eventIcon" style="font-size: 5rem; margin-bottom: 1rem; color: #f59e0b;">money_bag</span>
            <div class="result-title" id="eventTitle" style="font-size: 3rem; margin-bottom: 1rem;">Trésor !</div>
            <p style="color: #94a3b8; font-size: 1.2rem; margin-bottom: 2rem; max-width: 600px; text-align: center;" id="eventDesc">Vous avez trouvé un trésor.</p>
            <button class="action-btn" onclick="nextRoom()" style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: rgba(59, 130, 246, 0.4);">
                Continuer
            </button>
        </div>

        <div class="result-overlay" id="resultOverlay">
            <div class="result-title" id="resultTitle">VICTOIRE</div>
            <p style="color: #94a3b8; font-size: 1.2rem; margin-bottom: 2rem;" id="resultDesc">Le donjon a été complété.</p>
            <a href="/vault.html" class="action-btn" style="text-decoration: none;">
                Retourner à la page des donjons
            </a>
        </div>

    </div>

    <div class="action-bar">
        <button class="action-btn attack" id="btnAttack" onclick="doAction()" disabled style="flex-shrink: 0;">
            <span class="material-symbols-outlined">swords</span>
            Attaque
        </button>
        
        <div class="spells-container" id="spellsContainer">
            <!-- Spells generated by JS -->
        </div>

        <button class="action-btn" id="btnEndTurn" onclick="endTurn()" style="background: rgba(139, 92, 246, 0.2); color: #c084fc; border-color: rgba(139, 92, 246, 0.4); flex-shrink: 0;">
            <span class="material-symbols-outlined">hourglass_top</span>
            Fin de Tour
        </button>

        <a href="/dungeons.html" class="action-btn flee" style="text-decoration: none; flex-shrink: 0;">
            <span class="material-symbols-outlined">directions_run</span>
            Fuir
        </a>
    </div>

    <script src="/js/combat.js"></script>
</body>
</html>
