<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Grimoire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/components.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 50% 50%, #1e1b4b, #0f172a);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .auth-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            z-index: 10;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .auth-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .auth-logo .material-symbols-outlined {
            font-size: 2.2rem;
        }

        .auth-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .auth-field label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
        }

        .auth-field input {
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .auth-field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .auth-btn {
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            margin-top: 0.5rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.45);
        }

        .auth-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .auth-footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .auth-error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        /* Background Effects */
        .ambient-light {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 60%);
            top: -25vw;
            left: -25vw;
            border-radius: 50%;
            pointer-events: none;
        }
        .ambient-light-2 {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.06) 0%, transparent 60%);
            bottom: -20vw;
            right: -20vw;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <span class="material-symbols-outlined">auto_stories</span>
                Grimoire
            </div>
            <div class="auth-subtitle">Accéder à vos sauvegardes et personnages</div>
        </div>

        <div id="authError" class="auth-error"></div>

        <form id="loginForm" class="auth-form">
            <div class="auth-field">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="auth-field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="auth-btn">Se connecter</button>
        </form>

        <div class="auth-footer">
            Nouveau ici ? <a href="/register.html">Créer un compte</a>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
</body>
</html>
